services:
  api:
    build: ./api
    env_file: .env
    ports:
      - "3000:3000"
    volumes:
      - api-data:/app/data
      - /time-command-4fb8b-firebase-adminsdk-fbsvc-e8917f2b5a.json:/app/time-command-4fb8b-firebase-adminsdk-fbsvc-e8917f2b5a.json
    environment:
      - JWT_SECRET=${JWT_SECRET:-please-change-this-secret}
      - PORT=3000
      # FCM: pass from .env so Docker receives them (e.g. FCM_ENABLED, FCM_SERVICE_ACCOUNT_PATH or FCM_SERVICE_ACCOUNT_JSON)
      - FCM_ENABLED=${FCM_ENABLED:-true}
      - FCM_SERVICE_ACCOUNT_PATH=${FCM_SERVICE_ACCOUNT_PATH:-}
      - FCM_SERVICE_ACCOUNT_JSON=${FCM_SERVICE_ACCOUNT_JSON:-}
      - APP_URL=${APP_URL:-}
      - ONEDRIVE_CLIENT_ID=${ONEDRIVE_CLIENT_ID:-}
      - ONEDRIVE_CLIENT_SECRET=${ONEDRIVE_CLIENT_SECRET:-}
      - DROPBOX_CLIENT_ID=${DROPBOX_CLIENT_ID:-}
      - DROPBOX_CLIENT_SECRET=${DROPBOX_CLIENT_SECRET:-}
    restart: unless-stopped

  web:
    build: ./web
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - NODE_ENV=development

volumes:
  api-data:
